<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
    <div class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
        <h1>Login</h1>
        <label for="cpf">CPF:</label>
        <input type="text" name="cpf" value="{{ form_data.cpf if form_data else '' }}" placeholder="000.000.000-00">
        
        <label for="senha">Senha:</label>
        <div class="password-field">
        <input type="password" id="senha" name="senha" value="{{ form_data.senha if form_data else '' }}" placeholder="Digite sua senha">
            <span id="toggleSenha" class="toggle-password" title="Mostrar senha">
                <svg xmlns="http://www.w3.org/2000/svg&quot; width="20" height="20"
                        viewBox="0 0 24 24" fill="none"
                        stroke="#374151" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
            </span>
        </div>
        <button type="submit">Entrar</button>
        <a href="{{ url_for('home') }}">Voltar a página home</a>
    </form>
    </div>
<script>
    const cpfInput = document.querySelector('input[name="cpf"]');
    const senhaInput = document.getElementById('senha');
    const toggle = document.getElementById('toggleSenha');
    const eyeIcon = toggle.querySelector('svg');

    // Função para validar formato CPF
    function validarFormatoCPF(cpf) {
        const padrao = /^\d{3}\.\d{3}\.\d{3}-\d{2}$/;
        return padrao.test(cpf);
    }

    // Máscara para CPF
    cpfInput.addEventListener('input', function(e) {
        let valor = e.target.value.replace(/\D/g, '');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
        valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        e.target.value = valor.substring(0, 14);
    });

    // Validação em tempo real
    cpfInput.addEventListener('blur', function() {
        if (this.value && !validarFormatoCPF(this.value)) {
            this.setCustomValidity('CPF deve estar no formato 000.000.000-00');
            this.style.borderColor = '#ef4444';
        } else {
            this.setCustomValidity('');
            this.style.borderColor = '';
        }
    });

    // Toggle senha
    toggle.addEventListener('click', function(){
        const visivel = senhaInput.getAttribute('type') === 'text';
        senhaInput.type = visivel ? 'password' : 'text';
        eyeIcon.setAttribute('stroke', visivel ? '#374151' : '#2563eb');
    });
</script>

</body>
</html>
