<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
        <h1>Login</h1>
        <input type="text" name="cpf" value="{{ form_data.cpf if form_data else '' }}" placeholder="Digite seu CPF">
        <input type="password" name="senha" value="{{ form_data.senha if form_data else '' }}" placeholder="Digite sua senha">
        <button type="submit">Entrar</button>
    </form>
    </div>
</body>
</html>
